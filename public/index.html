<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Key Hub - รับ Key</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --card: #141b2d;
      --accent: #6c8cff;
      --accent-2: #4fd1c5;
      --text: #e8eefc;
      --muted: #9aa7c7;
      --danger: #ff6b6b;
      --ok: #51cf66;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Segoe UI, sans-serif;
      background: radial-gradient(circle at top, #1a2450, var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(520px, 100%);
      background: rgba(20, 27, 45, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), #8da2ff);
      color: white;
    }

    .secondary {
      background: #1f2942;
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #10182b;
      border: 1px solid rgba(255, 255, 255, 0.06);
      min-height: 52px;
      white-space: pre-wrap;
    }

    .key-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: #0d1424;
      border: 1px dashed rgba(79, 209, 197, 0.5);
      display: none;
    }

    .key-box.show { display: block; }

    .key-value {
      font-family: Consolas, monospace;
      font-size: 1.05rem;
      color: var(--accent-2);
      word-break: break-all;
      margin: 8px 0 12px;
    }

    .small {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .ok { color: var(--ok); }
    .err { color: var(--danger); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Script Hub Key</h1>
    <p>กดปุ่มด้านล่างเพื่อดู ads บน work.ink ก่อน จากนั้นจึงรับ Key ใช้งานได้ 24 ชั่วโมง.</p>

    <div class="actions">
      <button id="startBtn" class="primary">เริ่มดู ads</button>
      <button id="copyBtn" class="secondary" disabled>คัดลอก Key</button>
    </div>

    <div id="status" class="status">พร้อมเริ่ม</div>

    <div id="keyBox" class="key-box">
      <div class="small">Key ของคุณ</div>
      <div id="keyValue" class="key-value"></div>
      <div id="expireText" class="small"></div>
    </div>
  </main>

  <script>
    const API_BASE = window.location.origin;
    const STORAGE_KEY = "key-hub-gate-challenge";

    const startBtn = document.getElementById("startBtn");
    const copyBtn = document.getElementById("copyBtn");
    const statusEl = document.getElementById("status");
    const keyBox = document.getElementById("keyBox");
    const keyValue = document.getElementById("keyValue");
    const expireText = document.getElementById("expireText");

    let challengeId = null;
    let readyAtMs = 0;
    let waitTimer = null;
    let claiming = false;

    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = "status " + type;
    }

    function clearWaitTimer() {
      if (waitTimer) {
        clearInterval(waitTimer);
        waitTimer = null;
      }
    }

    function cleanUrl() {
      if (window.history.replaceState) {
        const clean = window.location.origin + window.location.pathname;
        window.history.replaceState(null, "", clean);
      }
    }

    function parseQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        challengeId: params.get("challenge_id"),
        readyAt: params.get("ready_at"),
      };
    }

    function saveChallengeState() {
      if (!challengeId) {
        sessionStorage.removeItem(STORAGE_KEY);
        return;
      }
      sessionStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({ challengeId, readyAtMs })
      );
    }

    function restoreChallengeState() {
      try {
        const saved = JSON.parse(sessionStorage.getItem(STORAGE_KEY) || "null");
        if (saved?.challengeId) {
          challengeId = saved.challengeId;
          readyAtMs = Number(saved.readyAtMs) || 0;
        }
      } catch (err) {
        sessionStorage.removeItem(STORAGE_KEY);
      }

      if (!challengeId) {
        const params = parseQueryParams();
        if (params.challengeId) {
          challengeId = params.challengeId;
          readyAtMs = params.readyAt ? Date.parse(params.readyAt) : 0;
          cleanUrl();
        }
      }

      if (challengeId) {
        saveChallengeState();
        if (getSecondsLeft() > 0) {
          setStatus(`กำลังรอ ${getSecondsLeft()} วินาที...`, "");
          scheduleClaim();
        } else {
          setStatus("กลับมาจาก ads แล้ว พร้อมรับ Key", "");
        }
      } else {
        setStatus("พร้อมเริ่ม", "");
      }

      updateStartButton();
    }

    function appendQueryParam(url, name, value) {
      try {
        const target = new URL(url);
        target.searchParams.set(name, value);
        return target.toString();
      } catch {
        return url;
      }
    }

    async function postJson(path, body = {}) {
      const res = await fetch(`${API_BASE}/api/${path}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      return res.json();
    }

    function getSecondsLeft() {
      return Math.max(0, Math.ceil((readyAtMs - Date.now()) / 1000));
    }

    async function claimKey() {
      if (!challengeId || claiming) return;

      claiming = true;
      setStatus("กำลังสร้าง Key...", "");

      try {
        const data = await postJson("generate-key", { challenge_id: challengeId });

        if (!data.ok) {
          const retryAfter = Number(data.retry_after_seconds || 0);
          if (retryAfter > 0) {
            readyAtMs = Date.now() + retryAfter * 1000;
            setStatus(`รออีก ${retryAfter} วินาที...`, "");
            claiming = false;
            scheduleClaim();
            return;
          }
          throw new Error(data.message || "สร้าง Key ไม่สำเร็จ");
        }

        keyValue.textContent = data.key;
        expireText.textContent = `หมดอายุ: ${new Date(data.expires_at).toLocaleString("th-TH")}`;
        keyBox.classList.add("show");
        copyBtn.disabled = false;
        setStatus("ได้ Key แล้ว คัดลอกไปใส่ใน Script ได้เลย", "ok");
        challengeId = null;
        saveChallengeState();
        updateStartButton();
      } catch (err) {
        setStatus(err.message, "err");
        updateStartButton();
      } finally {
        claiming = false;
      }
    }

    function scheduleClaim() {
      clearWaitTimer();

      waitTimer = setInterval(() => {
        const left = getSecondsLeft();
        if (left > 0) {
          setStatus(`กำลังรอ ${left} วินาที...`, "");
          return;
        }

        clearWaitTimer();
        claimKey();
      }, 250);
    }

    function updateStartButton() {
      if (!challengeId) {
        startBtn.textContent = "เริ่มดู ads";
        startBtn.disabled = false;
      } else if (getSecondsLeft() > 0) {
        startBtn.textContent = "ผมดู ads เสร็จแล้ว รับ Key";
        startBtn.disabled = false;
      } else {
        startBtn.textContent = "รับ Key ตอนนี้";
        startBtn.disabled = false;
      }
    }

    startBtn.addEventListener("click", async () => {
      if (challengeId) {
        if (getSecondsLeft() > 0) {
          setStatus("กรุณารอสักครู่จนกว่าจะครบเวลาที่กำหนดก่อนรับ Key...", "");
          return;
        }

        setStatus("กำลังสร้าง Key...", "");
        await claimKey();
        return;
      }

      startBtn.disabled = true;
      copyBtn.disabled = true;
      keyBox.classList.remove("show");
      clearWaitTimer();
      challengeId = null;
      readyAtMs = 0;
      claiming = false;
      saveChallengeState();

      let adWindow;
      try {
        adWindow = window.open("about:blank", "_blank");
      } catch (openErr) {
        adWindow = null;
      }

      try {
        const data = await postJson("gate-start");
        if (!data.ok) throw new Error(data.message || "เริ่ม gate ไม่สำเร็จ");

        challengeId = data.challenge_id;
        readyAtMs = Date.now() + Number(data.wait_seconds || 15) * 1000 + 1500;
        saveChallengeState();

        const returnUrl = `${window.location.origin}${window.location.pathname}?challenge_id=${encodeURIComponent(
          challengeId
        )}&ready_at=${encodeURIComponent(new Date(readyAtMs).toISOString())}`;
        const adUrl = appendQueryParam(data.ad_url || "https://work.ink", "return_url", returnUrl);

        if (adWindow) {
          adWindow.location = adUrl;
        } else {
          window.open(adUrl, "_blank");
        }

        setStatus("เปิดหน้า work.ink แล้ว ดู ads แล้วกลับมาคลิกปุ่มนี้อีกครั้งเพื่อรับ Key", "");
        updateStartButton();
        scheduleClaim();
      } catch (err) {
        if (adWindow && !adWindow.closed) {
          adWindow.close();
        }
        setStatus(err.message, "err");
        startBtn.disabled = false;
      }
    });

    copyBtn.addEventListener("click", async () => {
      if (!keyValue.textContent) return;
      await navigator.clipboard.writeText(keyValue.textContent);
      setStatus("คัดลอก Key แล้ว", "ok");
    });

    restoreChallengeState();
  </script>
</body>
</html>
