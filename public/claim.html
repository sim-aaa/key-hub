<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim Your Key</title>
  <style>
    :root {
      --primary: #6c5ce7;
      --secondary: #a29bfe;
      --success: #00cec9;
      --danger: #ff7675;
      --dark: #2d3436;
      --light: #f5f6fa;
      --gray: #636e72;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(50, 50, 93, 0.1), 0 5px 15px rgba(0, 0, 0, 0.07);
      width: 100%;
      max-width: 500px;
      padding: 40px;
      text-align: center;
      animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: var(--dark);
      margin-bottom: 15px;
      font-size: 2rem;
      font-weight: 600;
    }

    p {
      color: var(--gray);
      margin-bottom: 30px;
      line-height: 1.6;
    }

    #status {
      margin: 20px 0;
      padding: 15px;
      border-radius: 10px;
      font-size: 1rem;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success {
      background-color: rgba(0, 206, 201, 0.1);
      color: var(--success);
      border-left: 4px solid var(--success);
    }

    .error {
      background-color: rgba(255, 118, 117, 0.1);
      color: var(--danger);
      border-left: 4px solid var(--danger);
    }

    button {
      background: linear-gradient(to right, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 25px;
      padding: 12px 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(108, 92, 231, 0.2);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 14px rgba(108, 92, 231, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #result {
      margin-top: 30px;
      padding: 20px;
      border-radius: 10px;
      background: #f8f9fa;
      text-align: left;
    }

    #result h3 {
      color: var(--dark);
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    #result p {
      color: var(--gray);
      margin: 8px 0;
      word-break: break-all;
    }

    .key-display {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.1rem;
      font-weight: bold;
      margin: 10px 0;
      position: relative;
      overflow: hidden;
    }

    .key-display::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: white;
      opacity: 0.2;
    }

    .copy-btn {
      background: white;
      color: var(--primary);
      border: 2px solid var(--primary);
      margin-top: 15px;
    }

    .copy-btn:hover {
      background: var(--primary);
      color: white;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
      }
    }

    .key-display.pulse {
      animation: pulse 1.5s infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>รับ Key ของคุณ</h1>
    <p>กดปุ่มด้านล่างเพื่อรับ Key หลังจากดูโฆษณาเสร็จสิ้น</p>
    
    <div id="status">กำลังตรวจสอบ...</div>
    
    <button id="claimBtn" style="display: none;">รับ Key</button>
    
    <div id="result" style="display: none;">
      <h3>Key ของคุณ:</h3>
      <div id="keyDisplay" class="key-display"></div>
      <p id="expireText"></p>
      <button id="copyBtn" class="copy-btn">คัดลอก Key</button>
    </div>
  </div>

  <script>
    // Extract challenge_id and token from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    let challengeId = urlParams.get('challenge_id');
    const token = urlParams.get('token');

    document.addEventListener('DOMContentLoaded', async function() {
      const statusElement = document.getElementById('status');
      const claimBtn = document.getElementById('claimBtn');
      const resultElement = document.getElementById('result');
      const keyDisplay = document.getElementById('keyDisplay');
      const expireText = document.getElementById('expireText');
      const copyBtn = document.getElementById('copyBtn');

      // Check if user came from Work.ink by checking document.referrer
      const referrer = document.referrer;
      const isFromWorkInk = referrer.includes('work.ink');
      
      if (!isFromWorkInk) {
        statusElement.textContent = 'กรุณาเข้าหน้านี้ผ่านลิงก์ Work.ink เท่านั้น';
        statusElement.className = 'error';
        
        // Show a button to go to Work.ink
        const workInkBtn = document.createElement('button');
        workInkBtn.textContent = 'ไปยัง Work.ink';
        workInkBtn.style.marginTop = '20px';
        workInkBtn.addEventListener('click', () => {
          window.location.href = 'https://work.ink/2DHs/key-hub';
        });
        document.getElementById('result').appendChild(workInkBtn);
        
        return;
      }

      // Check if there's a saved key in localStorage
      const savedKeyData = localStorage.getItem('savedKeyData');
      if (savedKeyData) {
        try {
          const keyData = JSON.parse(savedKeyData);
          const now = new Date();
          const expiresAt = new Date(keyData.expiresAt);
          
          // Check if the key is still valid
          if (now < expiresAt) {
            // Key is still valid, show it
            keyDisplay.textContent = keyData.key;
            expireText.textContent = `Key นี้จะหมดอายุ: ${expiresAt.toLocaleString('th-TH')}`;
            
            // Add pulse animation
            keyDisplay.classList.add('pulse');
            
            resultElement.style.display = 'block';
            statusElement.textContent = 'คุณมี Key ที่ยังใช้งานได้อยู่! คัดลอก Key นี้ไปใช้งานได้เลย';
            statusElement.className = 'success';
            
            // Copy button functionality
            copyBtn.addEventListener('click', async () => {
              await navigator.clipboard.writeText(keyData.key);
              copyBtn.textContent = 'คัดลอกแล้ว! ✓';
              setTimeout(() => {
                copyBtn.textContent = 'คัดลอก Key';
              }, 2000);
            });
            
            return;
          }
        } catch (e) {
          console.error('Error parsing saved key:', e);
        }
      }

      // If no challenge_id, create a new one
      if (!challengeId) {
        try {
          statusElement.textContent = 'กำลังสร้าง challenge...';
          statusElement.className = '';
          
          const response = await fetch('/api/gate-start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          });
          const data = await response.json();

          if (data.ok) {
            challengeId = data.challenge_id;
            statusElement.textContent = 'พร้อมรับ Key แล้ว! กดปุ่มด้านล่าง';
            statusElement.className = 'success';
            claimBtn.style.display = 'block';
          } else {
            statusElement.textContent = 'เกิดข้อผิดพลาดในการสร้าง challenge: ' + data.message;
            statusElement.className = 'error';
            
            // Add retry button
            setTimeout(() => {
              location.reload();
            }, 2000);
            
            return;
          }
        } catch (error) {
          statusElement.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อ: ' + error.message;
          statusElement.className = 'error';
          
          // Add retry button
          setTimeout(() => {
            location.reload();
          }, 2000);
          
          return;
        }
      } else {
        // If challenge_id exists, show claim button immediately
        statusElement.textContent = 'พร้อมรับ Key แล้ว! กดปุ่มด้านล่าง';
        statusElement.className = 'success';
        claimBtn.style.display = 'block';
      }

      claimBtn.addEventListener('click', async () => {
        claimBtn.disabled = true;
        claimBtn.textContent = 'กำลังรับ Key...';

        try {
          const response = await fetch('/api/generate-key', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ challenge_id: challengeId })
          });

          const data = await response.json();

          if (data.ok) {
            keyDisplay.textContent = data.key;
            expireText.textContent = `Key นี้จะหมดอายุ: ${new Date(data.expires_at).toLocaleString('th-TH')}`;
            
            // Add pulse animation
            keyDisplay.classList.add('pulse');
            
            resultElement.style.display = 'block';
            statusElement.textContent = 'รับ Key สำเร็จ! คัดลอก Key นี้ไปใช้งานได้เลย';
            statusElement.className = 'success';
            
            // Save key to localStorage
            const keyData = {
              key: data.key,
              expiresAt: data.expires_at
            };
            localStorage.setItem('savedKeyData', JSON.stringify(keyData));
            
            // Copy button functionality
            copyBtn.addEventListener('click', async () => {
              await navigator.clipboard.writeText(data.key);
              copyBtn.textContent = 'คัดลอกแล้ว! ✓';
              setTimeout(() => {
                copyBtn.textContent = 'คัดลอก Key';
              }, 2000);
            });
          } else {
            statusElement.textContent = 'เกิดข้อผิดพลาด: ' + data.message;
            statusElement.className = 'error';
            
            // Show more detailed error message
            if (data.message.includes('IP')) {
              statusElement.textContent = 'เกิดข้อผิดพลาด: IP ของคุณไม่ตรงกับที่ใช้ในการสร้าง challenge';
            } else if (data.message.includes('wait')) {
              statusElement.textContent = 'เกิดข้อผิดพลาด: กรุณารอสักครู่ก่อนรับ Key';
            } else if (data.retry_after_seconds && data.retry_after_seconds > 0) {
              statusElement.textContent = `เกิดข้อผิดพลาด: กรุณารออีก ${data.retry_after_seconds} วินาที`;
              setTimeout(() => {
                claimBtn.style.display = 'block';
                claimBtn.textContent = 'ลองอีกครั้ง';
                claimBtn.disabled = false;
              }, data.retry_after_seconds * 1000);
            }
          }
        } catch (error) {
          statusElement.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อ: ' + error.message;
          statusElement.className = 'error';
        } finally {
          claimBtn.style.display = 'none';
        }
      });
    });
  </script>
</body>
</html>
